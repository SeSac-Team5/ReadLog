services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: readlog
      MYSQL_DATABASE: readlog
    ports:
      - "3306:3306"
    volumes:
      - readlog_mysql_data:/var/lib/mysql
      - ./docs/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  readlog_mysql_data:
